<div class="container mt-4">
  <div class="card rounded-4 shadow-sm border-0">
    <div class="card-body p-4">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <a href="#" class="text-decoration-none text-muted">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-arrow-left" viewBox="0 0 16 16">
            <path fill-rule="evenodd" d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5a.5.5 0 0 0 .5-.5z"/>
          </svg>
          <span class="ms-1">Other</span>
        </a>
        <button class="btn btn-light rounded-circle">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-person-fill" viewBox="0 0 16 16">
            <path d="M3 14s-1 0-1-1 1-4 6-4 6 3 6 4-1 1-1 1H3zm5-6a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/>

        </svg>
        <h4 class="mb-0">Genie</h4>
      </div>

      <h2 class="fw-bold mb-3">Send or pick up <br> anything <span class="fw-bold text-primary">instantly!</span></h2>

      <div class="row g-2 mb-3">
        <div class="col-md-6">
          <div class="bg-light rounded-3 p-3 d-flex align-items-center">
            <div class="bg-warning text-white rounded-circle p-2 me-2" style="width: 30px; height: 30px; display: flex; justify-content: center; align-items: center;">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="bi bi-tag-fill" viewBox="0 0 16 16">
                <path d="M2 1a1 1 0 0 0-1 1v4.586a1 1 0 0 0 .293.707l7 7a1 1 0 0 0 1.414 0l4.586-4.586a1 1 0 0 0 .707-.293V2a1 1 0 0 0-1-1H2z"/>

            </div>
            <div>
              <p class="mb-0 small fw-bold">Genie price drop alert!</p>
              <p class="mb-0 small text-muted">Send parcels at lower rates</p>
            </div>
          </div>
        </div>
        <div class="col-md-6">
          <div class="bg-light rounded-3 p-3">
            <p class="mb-0 small fw-bold text-success">JUST IN: Now, pay at the drop <br> location with COD</p>
          </div>
        </div>
      </div>

      <button class="btn btn-danger btn-lg rounded-pill w-100 mb-2">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-geo-alt-fill me-2" viewBox="0 0 16 16">
          <path d="M8 16s6-5.686 6-10A6 6 0 0 0 2 6c0 4.314 6 10 6 10zm0-7a3 3 0 1 1 0-6 3 3 0 0 1 0 6z"/>
        </svg>
        Set pick up location
      </button>

      <button class="btn btn-outline-secondary btn-sm rounded-pill w-100 mb-3">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-arrow-down me-2" viewBox="0 0 16 16">
          <path fill-rule="evenodd" d="M8 1a.5.5 0 0 1 .5.5v11.793l3.146-3.147a.5.5 0 0 1 .708.708l-4 4a.5.5 0 0 1-.708 0l-4-4a.5.5 0 0 1 .708-.708L7.5 13.293V1.5a.5.5 0 0 1 .5-.5z"/>
        </svg>
        Set drop location
      </button>

      <div class="bg-light rounded-3 p-3">
        <p class="mb-0 small">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="#dc3545" class="bi bi-flag-fill me-2" viewBox="0 0 16 16">
            <path d="M14.778-0.084A.5.5 0 0 0 14 0H1V15a.5.5 0 0 0 .5.5h4.586a.5.5 0 0 0 .379-.15l4.26-2.13a.5.5 0 0 0 .379.15h1.586a.5.5 0 0 0 .5-.5V.5a.5.5 0 0 0-.222-.416z"/>
          </svg>
          Extra <span class="fw-bold">10%</span> cashback
        </p>
        <p class="mb-0 small text-muted">WITH SWIGGY HDFC CARD | ABOVE ₹100</p>
      </div>
    </div>
  </div>
</div>
